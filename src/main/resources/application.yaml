spring:
  application:
    name: underwriter
  datasource:
    url: jdbc:h2:mem:underwritedb;DB_CLOSE_DELAY=-1
    driverClassName: org.h2.Driver
    username: sa
    password: password
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: update
    show-sql: false
  ai:
    openai:
      api-key: ${OPENAI_API_KEY}
      chat:
        options:
          model: gpt-4o
          temperature: 0.0
      embedding:
        options:
          model: text-embedding-3-small
    vectorstore:
      pgvector:
        host: localhost
        port: 5432
        database: vectordb
        username: postgres
        password: password
        table-name: financial_document_embeddings
        dimensions: 1536
servlet:
  multipart:
    max-file-size: 10MB
    max-request-size: 10MB